<!DOCTYPE html>
<html>
<head>
	<title>Felicitaciones a Nyhaan</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: Arial, sans-serif;
		}
		.contenedor {
			width: 100%;
			max-width: 800px;
			margin: 40px auto;
			background-color: #f7f7f7;
			padding: 20px;
			border: 1px solid #ddd;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
		}
		.titulo {
			color: #333;
			font-size: 24px;
			margin-bottom: 10px;
		}
		.foto {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			margin: 20px auto;
		}
		.foto img {
			width: 100%;
			height: 100%;
			border-radius: 50%;
			object-fit: cover;
		}
		.mensaje {
			color: #666;
			font-size: 18px;
			margin-bottom: 20px;
		}
		.felicitaciones {
			background-color: #4CAF50;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}
		.felicitaciones:hover {
			background-color: #3e8e41;
		}
		.redes-sociales {
			list-style: none;
			margin: 0;
			padding: 0;
			display: flex;
			justify-content: center;
		}
		.redes-sociales li {
			margin-right: 20px;
		}
		.redes-sociales a {
			color: #333;
			text-decoration: none;
		}
		@media (max-width: 768px) {
			.contenedor {
				width: 90%;
			}
		}
		@media (max-width: 480px) {
			.contenedor {
				width: 100%;
			}
			.mensaje {
				font-size: 16px;
			}
		}
	</style>
</head>
<body>
	<div class="contenedor">
		<div class="foto">
			<img src="https://picsum.photos/200/300" alt="Foto de Nyhaan">
		</div>
		<h2 class="titulo">Felicitaciones a Nyhaan</h2>
		<p class="mensaje">¡Querido Nyhaan! Te deseo lo mejor en este día especial. ¡Eres una persona increíble y mereces todo el éxito del mundo!</p>
		<button class="felicitaciones">Felicitaciones</button>
		<ul class="redes-sociales">
			<li><a href="#" target="_blank"><i class="fa fa-facebook" aria-hidden="true"></i></a></li>
			<li><a href="#" target="_blank"><i class="fa fa-twitter" aria-hidden="true"></i></a></li>
			<li><a href="#" target="_blank"><i class="fa fa-instagram" aria-hidden="true"></i></a></li>
		</ul>
	</div>
	<script>
		document.addEventListener("DOMContentLoaded", function() {
			document.querySelector(".felicitaciones").addEventListener("click", function() {
				alert("¡Felicitaciones a Nyhaan!");
			});
		});
	</script>
</body>
</html>
