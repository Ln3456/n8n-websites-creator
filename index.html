<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Felicitaciones a Nyhaan</title><style>body{font-family: Arial, sans-serif;background-color: #f7f7f7;}.container{max-width: 800px;margin: 40px auto;padding: 20px;background-color: #fff;border-radius: 10px;box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);}.header{background-color: #007bff;color: #fff;padding: 20px;text-align: center;}.header h1{font-size: 24px;margin-bottom: 10px;}.header h2{font-size: 18px;margin-bottom: 20px;}.content{padding: 20px;}.content h2{font-size: 22px;margin-bottom: 10px;}.content p{font-size: 18px;margin-bottom: 20px;}.footer{background-color: #007bff;color: #fff;padding: 10px;text-align: center;}.footer p{font-size: 14px;margin-bottom: 10px;}</style><script>document.addEventListener("DOMContentLoaded", function(){var header = document.querySelector(".header");var content = document.querySelector(".content");var footer = document.querySelector(".footer");header.style.background = "linear-gradient(to bottom, #0080ff, #0069d9)";header.style.boxShadow = "0 0 10px rgba(0, 0, 0, 0.3)";content.style.overflow = "hidden";content.style.height = "200px";content.style.transition = "height 0.5s";footer.style.background = "linear-gradient(to bottom, #0080ff, #0069d9)";footer.style.boxShadow = "0 0 10px rgba(0, 0, 0, 0.3)";});</script></head><body><div class="container"><div class="header"><h1>Felicitaciones a Nyhaan</h1><h2>Te deseo lo mejor en este día especial</h2></div><div class="content"><h2>¡Eres una persona increíble!</h2><p>Tienes un corazón lleno de amor y un espíritu inquebrantable. Me alegra poder llamarte amigo.</p><p>Que este día sea solo el principio de muchos más felices juntos.</p></div><div class="footer"><p>Con cariño, <span style="font-weight: bold;">Tu amigo</span></p></div></div></body></html>
