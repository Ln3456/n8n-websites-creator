<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felicitaciones a Nyhaan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: #333;
            color: #fff;
            padding: 1em;
            text-align: center;
        }
        
        header h1 {
            margin: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 2em auto;
            padding: 1em;
            background-color: #fff;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .felicitaciones {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .imagen {
            width: 100%;
            height: 200px;
            background-image: linear-gradient(to bottom, #fff, #ccc);
            background-size: 100% 300px;
            background-position: 0% 100%;
            transition: background-position 1s ease;
        }
        
        .imagen:hover {
            background-position: 0% 0%;
        }
        
        .foto {
            width: 50%;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 1em auto;
        }
        
        .mensaje {
            font-size: 18px;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .imagen {
                height: 150px;
            }
            .foto {
                width: 100%;
                height: 100px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                margin: 0;
                padding: 0;
            }
            .felicitaciones {
                font-size: 20px;
            }
            .mensaje {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Felicitaciones a Nyhaan</h1>
    </header>
    <div class="container">
        <div class="imagen">
            <img src="https://picsum.photos/200/300" alt="Imagen de fondo">
        </div>
        <div class="felicitaciones">
            ¡Felicitaciones Nyhaan! Esperamos que tu día sea increíble y te llene de alegría y felicidad.
        </div>
        <img class="foto" src="https://picsum.photos/200/200" alt="Foto de Nyhaan">
        <div class="mensaje">
            ¡Eres una persona muy especial y mereces ser felicitada por todo lo que logras! Te deseamos mucha suerte y éxitos en todos tus proyectos.
        </div>
    </div>
    <script>
        // No hay código JavaScript para este ejemplo
    </script>
</body>
</html>
